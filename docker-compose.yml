services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ikarmic_crm
      MYSQL_USER: ikarmic
      MYSQL_PASSWORD: ikarmic_dev
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
